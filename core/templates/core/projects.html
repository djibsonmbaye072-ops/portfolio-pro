{% extends 'core/base.html' %}
{% load static %}

{% block title %}Réalisations{% endblock %}

{% block content %}

<style>

/* BACKGROUND */
.bg{
    background:
    radial-gradient(circle at 10% 20%, rgba(56,189,248,0.15), transparent),
    radial-gradient(circle at 90% 80%, rgba(99,102,241,0.15), transparent),
    #020617;
}

/* CONTAINER */
.container{
    max-width:1200px;
    margin:auto;
    padding:120px 20px;
}

/* TITLE */
.title{
    text-align:center;
    margin-bottom:60px;
}

.title h1{
    font-size:60px;
    font-weight:900;
    background:linear-gradient(to right,#38bdf8,#6366f1);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* FILTER */
.filters{
    text-align:center;
    margin-bottom:50px;
}

.filter-btn{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#1e293b;
    color:#cbd5f5;
    cursor:pointer;
    transition:0.3s;
}

.filter-btn.active,
.filter-btn:hover{
    background:#38bdf8;
    color:black;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.04);
    border-radius:20px;
    overflow:hidden;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.05);
    transition:0.4s;
    position:relative;
}

/* IMAGE */
.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

/* CONTENT */
.card-content{
    padding:20px;
}

.card h3{
    margin-bottom:10px;
}

.card p{
    color:#94a3b8;
    font-size:14px;
}

/* HOVER */
.card::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(56,189,248,0.2), transparent 60%);
    opacity:0;
    transition:0.4s;
}

.card:hover::before{
    opacity:1;
}

.card:hover{
    transform:translateY(-10px) scale(1.02);
}

/* BUTTON */
.btn{
    display:inline-block;
    margin-top:15px;
    padding:8px 15px;
    background:#38bdf8;
    color:black;
    border-radius:10px;
    text-decoration:none;
    font-size:14px;
}

.fade{
    opacity:0;
    transform:translateY(40px);
    transition:1s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

</style>

<div class="bg">

<div class="container">

    <!-- TITLE -->
    <div class="title fade">
        <h1>Réalisations</h1>
    </div>

    <!-- FILTERS -->
    <div class="filters fade">
        <button class="filter-btn active" data-filter="all">Tout</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="bio">Biomédical</button>
        <button class="filter-btn" data-filter="other">Autres</button>
    </div>

    <!-- GRID -->
    <div class="grid">

        {% for project in projects %}
        <div class="card fade" data-category="{{ project.category|default:'web' }}">

            <img src="{{ project.image.url }}">

            <div class="card-content">
                <h3>{{ project.title }}</h3>
                <p>{{ project.description }}</p>

                {% if project.link %}
                <a href="{% url 'project_detail' project.id %}" class="btn">
                    Voir détails
                </a>
                {% endif %}
            </div>

        </div>
        {% endfor %}

    </div>

</div>

</div>

<script>

/* SCROLL ANIMATION */
const elements = document.querySelectorAll('.fade');

window.addEventListener('scroll',()=>{
    const trigger = window.innerHeight * 0.85;

    elements.forEach(el=>{
        if(el.getBoundingClientRect().top < trigger){
            el.classList.add('show');
        }
    });
});

/* FILTER */
const buttons = document.querySelectorAll('.filter-btn');
const cards = document.querySelectorAll('.card');

buttons.forEach(btn=>{
    btn.addEventListener('click',()=>{

        document.querySelector('.active').classList.remove('active');
        btn.classList.add('active');

        let filter = btn.dataset.filter;

        cards.forEach(card=>{
            if(filter === "all" || card.dataset.category === filter){
                card.style.display = "block";
            }else{
                card.style.display = "none";
            }
        });

    });
});

</script>

{% endblock %}
