{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}DJIBRIL MBAYE{% endblock %}</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
    --bg:#070d1a;
    --text:#ffffff;
    --nav:rgba(2,6,23,0.7);
}

body.light{
    --bg:#f8fafc;
    --text:#0f172a;
    --nav:rgba(255,255,255,0.7);
}

body{
    font-family:'Segoe UI',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* ===== NAVBAR ===== */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    z-index:1000;
    transition:0.3s;
}

.navbar.scrolled{
    background:var(--nav);
    backdrop-filter:blur(10px);
}

.logo{
    font-weight:700;
    font-size:18px;
}

/* NAV LINKS */
.nav-links{
    display:flex;
    align-items:center;
}

.nav-links a{
    margin-left:25px;
    color:#cbd5f5;
    text-decoration:none;
    font-weight:500;
}

.nav-links a:hover{
    color:#38bdf8;
}

/* ===== BURGER ===== */
.menu-toggle{
    display:none;
    font-size:22px;
    cursor:pointer;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

    .menu-toggle{
        display:block;
    }

    .nav-links{
        position:absolute;
        top:70px;
        left:0;
        width:100%;
        background:rgba(2,6,23,0.95);
        flex-direction:column;
        text-align:center;
        display:none;
        padding:20px 0;
        backdrop-filter:blur(10px);
    }

    .nav-links a{
        margin:15px 0;
        font-size:16px;
    }

    .nav-links.active{
        display:flex;
    }

}

/* ===== PAGE ===== */
.page{
    margin-top:100px;
    opacity:0;
    transform:translateY(30px);
    animation:pageEnter 0.8s ease forwards;
}

@keyframes pageEnter{
    to{opacity:1;transform:translateY(0);}
}

/* ===== LOADER ===== */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loader-text{
    font-size:22px;
    letter-spacing:3px;
    animation:blink 1s infinite alternate;
}

@keyframes blink{
    from{opacity:0.3;}
    to{opacity:1;}
}

.toggle{
    margin-left:20px;
    padding:8px 12px;
    border-radius:8px;
    background:#38bdf8;
    border:none;
    cursor:pointer;
}

</style>

</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="loader-text">DJIBRIL MBAYE</div>
</div>

<!-- NAVBAR -->
<header class="navbar" id="navbar">

    <div class="logo">DJIBRIL MBAYE</div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fa-solid fa-bars"></i>
    </div>

    <nav class="nav-links" id="navLinks">

        <a href="{% url 'home' %}">
            <i class="fa-solid fa-house"></i> Accueil
        </a>

        <a href="{% url 'about' %}">
            <i class="fa-solid fa-user"></i> Présentation
        </a>

        <a href="{% url 'experience' %}">
            <i class="fa-solid fa-briefcase"></i> Expériences
        </a>

        <a href="{% url 'projects' %}">
            <i class="fa-solid fa-diagram-project"></i> Réalisations
        </a>

        <a href="{% url 'skills' %}">
            <i class="fa-solid fa-bolt"></i> Compétences
        </a>

        <a href="{% url 'roman' %}">
            <i class="fa-solid fa-book"></i> Roman
        </a>

        <button class="toggle" onclick="toggleMode()">🌙</button>

    </nav>

</header>

<!-- CONTENT -->
<div class="page">
{% block content %}
{% endblock %}
</div>

<script>

/* ===== MENU MOBILE ===== */
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

/* ===== LOADER ===== */
window.addEventListener("load",()=>{
    const loader=document.getElementById("loader");
    loader.style.display="none";
});

/* ===== NAV SCROLL ===== */
window.addEventListener("scroll",()=>{
    document.getElementById("navbar")
    .classList.toggle("scrolled", window.scrollY > 50);
});

/* ===== DARK MODE ===== */
function toggleMode(){
    document.body.classList.toggle("light");
}

/* ===== TRANSITION ===== */
document.querySelectorAll("a").forEach(link=>{
    link.addEventListener("click", function(e){
        const href=this.getAttribute("href");

        if(!href || href.startsWith("#") || href.startsWith("http")) return;

        e.preventDefault();

        gsap.to(".page",{
            opacity:0,
            y:30,
            duration:0.4,
            onComplete:()=>window.location.href=href
        });
    });
});

</script>

</body>
</html>
